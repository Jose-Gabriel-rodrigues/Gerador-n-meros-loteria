<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Gerador de Loteria</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Gerador de Números para Loteria</h1>

      <p>Escolha uma modalidade e clique em "Gerar Números".</p>

      <select id="tipo">
        <option>Mega-Sena</option>
        <option>Quina</option>
        <option>Lotofácil</option>
      </select>

      <br /><br />

      <button>Gerar Números</button>
      <button id="limpar" style="background-color: red; color: white; border: none; padding: 10px 20px; cursor: pointer;">Limpar Resultado</button>

      <h2 id="resultado"></h2>
    </div>

    <script src="script.js"></script>
  </body>
</html>
